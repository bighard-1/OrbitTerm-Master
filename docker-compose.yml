services:
  orbit-db:
    image: postgres:16-alpine
    container_name: orbit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbitterm
      POSTGRES_USER: orbitterm
      POSTGRES_PASSWORD: orbitterm_pass
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - orbit_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitterm -d orbitterm"]
      interval: 5s
      timeout: 3s
      retries: 20

  orbit-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bighard-1/orbitterm-server:latest
    container_name: orbit-api
    restart: unless-stopped
    depends_on:
      orbit-db:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "host=orbit-db user=orbitterm password=orbitterm_pass dbname=orbitterm port=5432 sslmode=disable TimeZone=UTC"
      JWT_SECRET: "replace-with-strong-jwt-secret"
      JWT_ISSUER: "orbitterm-server"
      JWT_ACCESS_EXPIRE_MINUTES: "15"
      JWT_REFRESH_EXPIRE_DAYS: "30"
      ADMIN_BOOTSTRAP_TOKEN: "replace-with-strong-admin-bootstrap-token"
      ADMIN_AUTO_UNBAN_ENABLED: "true"
      ADMIN_AUTO_UNBAN_INTERVAL_MINUTES: "10"
      ADMIN_AUTO_UNBAN_BATCH_LIMIT: "100"
      ASSET_TRASH_CLEANUP_INTERVAL_MINUTES: "60"
      # 生产默认避免常规 SQL 进入容器日志；日志参数始终使用占位符脱敏。
      DB_LOG_LEVEL: "warn"
      # 按实际反向代理容器 IP/CIDR 调整；不使用代理可设为空字符串。
      TRUSTED_PROXIES: "127.0.0.1,::1"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  orbit_db_data:
